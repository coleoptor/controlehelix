<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Présence Club</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f2f4f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{

  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);

  width:320px;
  text-align:center;
}

.logo{
  width:120px;
  margin-bottom:15px;
}

h1{
  margin-top:0;
  color:#222;
}

input{

  width:100%;
  padding:14px;
  margin-top:10px;

  border-radius:10px;
  border:1px solid #ccc;

  font-size:16px;
  box-sizing:border-box;
}

button{

  width:100%;
  margin-top:20px;

  padding:16px;

  border:none;
  border-radius:12px;

  background:#2563eb;
  color:white;

  font-size:18px;
  font-weight:bold;

  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.success{

  margin-top:15px;
  color:green;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

  <img src="1000078005.jpg" class="logo">

  <h1>Club Sportif</h1>

  <input id="nom" placeholder="Nom">

  <input id="prenom" placeholder="Prénom">

  <button onclick="envoyer()">
    Je suis présent
  </button>

  <div id="message" class="success"></div>

</div>

<script>

document.getElementById("nom").value =
 localStorage.getItem("nom") || "";

document.getElementById("prenom").value =
 localStorage.getItem("prenom") || "";

function envoyer(){

  let nom =
   document.getElementById("nom").value;

  let prenom =
   document.getElementById("prenom").value;

  localStorage.setItem("nom", nom);
  localStorage.setItem("prenom", prenom);

  fetch("https://script.google.com/macros/s/AKfycbxAiJRkt71qihKiNTi1kaG3kXcaGtx8liUGMbisUFy2BuIBfH82lxmzXMDHsAAtwBcg/exec", {

    method:"POST",

    body:JSON.stringify({
      nom:nom,
      prenom:prenom
    })

  })
  .then(() => {

    document.getElementById("message")
      .innerHTML =
      "✓ Présence enregistrée";

  })
  .catch(() => {

    document.getElementById("message")
      .innerHTML =
      "Erreur";

  });

}

</script>

</body>
</html>

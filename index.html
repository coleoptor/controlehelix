<!DOCTYPE html>
<html>
<body>

<h2>Présence club bienvenu</h2>
<img src="1000078005.jpg" class="logo">
  
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">

<button onclick="envoyer()">Je suis présent</button>

<script>

document.getElementById("nom").value =
  localStorage.getItem("nom") || "";

document.getElementById("prenom").value =
  localStorage.getItem("prenom") || "";

function envoyer() {

  let nom = document.getElementById("nom").value;
  let prenom = document.getElementById("prenom").value;

  localStorage.setItem("nom", nom);
  localStorage.setItem("prenom", prenom);

  fetch("https://script.google.com/macros/s/AKfycbxAiJRkt71qihKiNTi1kaG3kXcaGtx8liUGMbisUFy2BuIBfH82lxmzXMDHsAAtwBcg/exec", {
    method: "POST",
    body: JSON.stringify({
      nom: nom,
      prenom: prenom,
      cours: "Lundi 19h"
    })
  });

  alert("Présence enregistrée");
}

</script>

</body>
</html>

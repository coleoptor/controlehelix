<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Présence Club</title>

  <style>

    body{
      margin:0;
      padding:0;

      font-family:Arial, sans-serif;

      background:#f2f4f8;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
    }

    .card{

      width:340px;

      background:white;

      border-radius:24px;

      padding:30px;

      box-shadow:0 6px 20px rgba(0,0,0,0.12);

      text-align:center;
    }

    .logo{
      width:120px;
      margin-bottom:10px;
    }

    h1{
      margin-top:0;
      margin-bottom:10px;
      color:#222;
    }

    .welcome{
      color:#666;
      margin-bottom:25px;
    }

    .card-seance{

      background:#ffffff;

      border-radius:16px;

      padding:18px;

      margin-top:15px;

      border:2px solid #e5e7eb;

      cursor:pointer;

      transition:0.2s;
    }

    .card-seance:hover{
      transform:scale(1.02);
    }

    .card-seance.selected{
      border:2px solid #2563eb;
      background:#eff6ff;
    }

    .cours{
      font-size:22px;
      font-weight:bold;
      color:#111827;
    }

    .heure{
      margin-top:8px;
      color:#6b7280;
      font-size:16px;
    }

    button{

      width:100%;

      margin-top:25px;

      padding:16px;

      border:none;

      border-radius:14px;

      background:#2563eb;

      color:white;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;
    }

    button:hover{
      opacity:0.95;
    }

    .message{

      margin-top:20px;

      font-weight:bold;

      color:green;
    }

  </style>

</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <h1>Club Sportif</h1>

  <div class="welcome" id="welcome">
    Bienvenue 👋
  </div>

  <!-- LISTE DES SEANCES -->
  <div id="listeSeances">

    Chargement des séances...

  </div>

  <!-- BOUTON -->
  <button onclick="validerPresence()">
    Je suis présent
  </button>

  <!-- MESSAGE -->
  <div id="message" class="message"></div>

</div>

<script>

  // =========================
  // CONFIG
  // =========================

  const API_URL =
    "https://script.google.com/macros/s/AKfycbyq69R-VfA30THQLwA9QUOROD-Edk2yBjPGsUZHv2uFV5fJg8hrBmyhLPWWo0rTuGqW/exec";

  // =========================
  // VARIABLES
  // =========================

  let nom =
    localStorage.getItem("nom");

  let prenom =
    localStorage.getItem("prenom");

  let seanceChoisie = "";

  // =========================
  // PREMIERE UTILISATION
  // =========================

  if(!nom){

    nom =
      prompt("Votre nom");

    localStorage.setItem("nom", nom);
  }

  if(!prenom || prenom == "null"){

    prenom =
      prompt("Votre prénom");

    localStorage.setItem("prenom", prenom);
  }
  

  // =========================
  // MESSAGE BIENVENUE
  // =========================

  document
    .getElementById("welcome")
    .innerHTML =
      "Bienvenue " + prenom + " 👋";

  // =========================
  // CHARGEMENT SEANCES
  // =========================

  chargerSeances();

  function chargerSeances(){

    fetch(API_URL)

    .then(r => r.json())

    .then(data => {
console.log(data);
      afficherSeances(data);

    })

    .catch(() => {

      document
        .getElementById("listeSeances")
        .innerHTML =
          "Erreur chargement séances";

    });
  }

  // =========================
  // AFFICHAGE SEANCES
  // =========================

  function afficherSeances(seances){

    let html = "";

    if(seances.length == 0){

      html =
        "<p>Aucune séance aujourd'hui</p>";
    }

    seances.forEach((s,index) => {

      html += `

        <div
          class="card-seance"
          id="seance-${index}"
          onclick="
            selectionnerSeance(
              '${s.cours}',
              '${s.heure}',
              ${index}
            )
          "
        >

          <div class="cours">
            ${s.cours}
          </div>

          <div class="heure">
            Début : ${s.heure}
          </div>

        </div>

      `;
    });

    document
      .getElementById("listeSeances")
      .innerHTML = html;
  }

  // =========================
  // SELECTION SEANCE
  // =========================

  function selectionnerSeance(
    cours,
    heure,
    index
  ){

    seanceChoisie =
      cours + " - " + heure;

    // retire sélection précédente

    document
      .querySelectorAll(".card-seance")
      .forEach(c => {

        c.classList.remove("selected");

      });

    // ajoute sélection

    document
      .getElementById("seance-" + index)
      .classList.add("selected");
  }

  // =========================
  // VALIDATION PRESENCE
  // =========================

  function validerPresence(){

    if(seanceChoisie == ""){

      alert(
        "Veuillez sélectionner une séance"
      );

      return;
    }

    fetch(API_URL, {

      method:"POST",

      body:JSON.stringify({

        nom:nom,
        prenom:prenom,
        seance:seanceChoisie

      })

    })

    .then(r => r.text())

    .then(() => {

      document
        .getElementById("message")
        .innerHTML =
          "✓ Présence enregistrée";

    })

    .catch(() => {

      document
        .getElementById("message")
        .innerHTML =
          "Erreur envoi";

    });
  }

</script>

</body>
</html>
